<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Enrollment — School of Freelancing</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/assets/js/sof-shared.js"></script>
</head>
<body>
<canvas id="matrix-canvas"></canvas>

<section class="section">
  <div class="container" style="max-width:640px;">
    <div class="enrollment-form-card">
      <h2>Enrollment Verification</h2>
      <div id="verify-status">Checking link…</div>
      <div id="verify-details" style="display:none; margin-top:20px;">
        <table class="table" style="width:100%; color:var(--text-primary,#fff);">
          <tbody id="details-body"></tbody>
        </table>
        <button id="mark-paid-btn" class="btn btn-primary btn-lg" style="width:100%;">✅ Mark as Paid & Send Invoice</button>
        <p id="paid-msg" style="margin-top:14px; display:none;"></p>
      </div>
    </div>
  </div>
</section>

<script src="/assets/js/main.js"></script>
<script>
(function () {
  var statusEl = document.getElementById('verify-status');
  var detailsEl = document.getElementById('verify-details');
  var bodyEl = document.getElementById('details-body');
  var btn = document.getElementById('mark-paid-btn');
  var paidMsg = document.getElementById('paid-msg');
  var S = window.SOF;

  var params = new URLSearchParams(location.search);
  var d = params.get('d');
  var s = params.get('s');
  var record;

  function row(label, value) {
    return '<tr><td style="opacity:.7;padding:6px 10px;">' + label + '</td><td style="padding:6px 10px;">' + value + '</td></tr>';
  }

  function renderDetails(r) {
    bodyEl.innerHTML =
      row('Enrollment ID', r.id) +
      row('Student', r.fullName) +
      row('Email', r.email) +
      row('Phone', r.phone) +
      row('Country', r.country) +
      row('Training', r.trainingName) +
      row('Fee', '$' + r.trainingFeeUSD) +
      row('Payment Method', r.paymentMethod) +
      row('Transaction ID', r.txId || '(not provided)') +
      row('Submitted', r.createdAt) +
      row('Status', r.status);
    detailsEl.style.display = '';
    if (r.status === 'paid') {
      btn.style.display = 'none';
      paidMsg.style.display = '';
      paidMsg.textContent = 'Already marked paid on ' + r.paidAt + ' (Invoice ' + r.invoiceNumber + ').';
    }
  }

  function buildInvoicePdf(r) {
    var jsPDFLib = window.jspdf.jsPDF;
    var doc = new jsPDFLib();
    doc.setFontSize(18);
    doc.text('School of Freelancing — Invoice', 14, 20);
    doc.setFontSize(11);
    var lines = [
      'Invoice Number: ' + r.invoiceNumber,
      'Enrollment ID: ' + r.id,
      'Date: ' + r.paidAt,
      '',
      'Billed To: ' + r.fullName,
      'Email: ' + r.email,
      'Phone: ' + r.phone,
      'Country: ' + r.country,
      '',
      'Training: ' + r.trainingName,
      'Amount Paid: $' + r.trainingFeeUSD,
      'Payment Method: ' + r.paymentMethod,
      'Transaction ID: ' + (r.txId || 'N/A'),
      '',
      'Status: PAID'
    ];
    doc.text(lines, 14, 35);
    return doc;
  }

  btn.addEventListener('click', function () {
    btn.disabled = true;
    btn.textContent = 'Processing…';
    var invoiceNumber = S.generateInvoiceNumber();

    S.markPaid(d, s, invoiceNumber).then(function (signed) {
      return S.verifyFromQuery('?d=' + signed.d + '&s=' + signed.s).then(function (check) {
        if (!check.valid) throw new Error('re-verify failed');
        var paidRecord = check.record;
        S.upsertEnrollment(paidRecord.id, paidRecord);

        var doc = buildInvoicePdf(paidRecord);
        var pdfBase64 = doc.output('datauristring').split(',')[1];

        var canEmail = window.emailjs && S.CONFIG.EMAILJS_PUBLIC_KEY.indexOf('YOUR_') !== 0;
        if (canEmail) {
          emailjs.init({ publicKey: S.CONFIG.EMAILJS_PUBLIC_KEY });
          return emailjs.send(S.CONFIG.EMAILJS_SERVICE_ID, S.CONFIG.TEMPLATE_STUDENT_INVOICE, {
            to_email: paidRecord.email,
            student_name: paidRecord.fullName,
            enrollment_id: paidRecord.id,
            invoice_number: paidRecord.invoiceNumber,
            training_name: paidRecord.trainingName,
            training_fee: '$' + paidRecord.trainingFeeUSD,
            paid_at: paidRecord.paidAt,
            invoice_pdf_base64: pdfBase64
          }).then(function () { return paidRecord; });
        }
        doc.save(paidRecord.invoiceNumber + '.pdf');
        return paidRecord;
      });
    }).then(function (paidRecord) {
      renderDetails(paidRecord);
      btn.style.display = 'none';
      paidMsg.style.display = '';
      paidMsg.textContent = '✅ Marked paid. Invoice ' + paidRecord.invoiceNumber + ' generated and emailed to the student.';
    }).catch(function (err) {
      console.error(err);
      btn.disabled = false;
      btn.textContent = '✅ Mark as Paid & Send Invoice';
      alert('Could not complete verification: ' + err.message);
    });
  });

  if (!d || !s) {
    statusEl.textContent = '❌ Invalid or missing verification link.';
    return;
  }

  S.verifyFromQuery(location.search).then(function (result) {
    if (!result.valid) {
      statusEl.textContent = '❌ This link failed verification (' + result.reason + '). It may be tampered with or corrupted.';
      return;
    }
    record = result.record;
    statusEl.textContent = '✅ Signature verified.';
    renderDetails(record);
  }).catch(function () {
    statusEl.textContent = '❌ Could not reach the verification service. Try again shortly.';
  });
})();
</script>
</body>
</html>
